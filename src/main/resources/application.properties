spring.application.name=pharmacy_webapp

# mongodb
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Gemini Config
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash-lite
gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/
gemini.max-tokens=1024
gemini.temperature=0.7
gemini.system-prompt=${GEMINI_SYSTEM_PROMPT}

#vnpay
vnpay.url=${VNPAY_URL}
vnpay.return-url=${VNPAY_RETURN_URL}
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.api-url=${VNPAY_API_URL}

# server
server.port=${PORT:8080}

# api-doc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true